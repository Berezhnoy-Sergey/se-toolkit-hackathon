services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    networks:
      - taskflow-network
    ports:
      - ${BACKEND_HOST_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-42001}:${BACKEND_CONTAINER_PORT:-8000}
    environment:
      - NAME=${BACKEND_NAME:-TaskFlow}
      - DEBUG=${BACKEND_DEBUG:-false}
      - ADDRESS=${BACKEND_CONTAINER_ADDRESS:-0.0.0.0}
      - PORT=${BACKEND_CONTAINER_PORT:-8000}
      - RELOAD=${BACKEND_RELOAD:-false}
      - UVICORN_HOST=${BACKEND_CONTAINER_ADDRESS:-0.0.0.0}
      - UVICORN_PORT=${BACKEND_CONTAINER_PORT:-8000}
      - UVICORN_RELOAD=${BACKEND_RELOAD:-false}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["*"]}
      - LMS_API_KEY=${LMS_API_KEY:-taskflow_api_key_change_this}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-taskflow}
      - DB_USER=${POSTGRES_USER:-taskflow}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-taskflow_secure_password_2026}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}postgres:18.3-alpine
    restart: unless-stopped
    networks:
      - taskflow-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-taskflow}
      - POSTGRES_USER=${POSTGRES_USER:-taskflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-taskflow_secure_password_2026}
    ports:
      - ${POSTGRES_HOST_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-42004}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  nanobot:
    build:
      context: .
      dockerfile: nanobot/Dockerfile
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
    restart: unless-stopped
    networks:
      - taskflow-network
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-your_openrouter_or_qwen_api_key_here}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_API_MODEL=${LLM_API_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - NANOBOT_TASKS_BACKEND_URL=http://backend:${BACKEND_CONTAINER_PORT:-8000}
      - NANOBOT_TASKS_API_KEY=${LMS_API_KEY:-taskflow_api_key_change_this}
      - NANOBOT_GATEWAY_CONTAINER_ADDRESS=${NANOBOT_GATEWAY_CONTAINER_ADDRESS:-0.0.0.0}
      - NANOBOT_GATEWAY_CONTAINER_PORT=${NANOBOT_GATEWAY_CONTAINER_PORT:-18790}
      - NANOBOT_ACCESS_KEY=${NANOBOT_ACCESS_KEY:-nanobot_access_key_change_this}
    depends_on:
      - backend

  caddy:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}caddy:2.11-alpine
    restart: unless-stopped
    networks:
      - taskflow-network
    depends_on:
      - backend
    environment:
      - CADDY_CONTAINER_PORT=${CADDY_CONTAINER_PORT:-80}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT:-8000}
    ports:
      - ${GATEWAY_HOST_ADDRESS:-0.0.0.0}:${GATEWAY_HOST_PORT:-42002}:${CADDY_CONTAINER_PORT:-80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./web-client:/srv/web:ro

volumes:
  postgres_data:

networks:
  taskflow-network:
    name: taskflow-network
    attachable: true
