services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://taskflow:${POSTGRES_PASSWORD:-taskflow_password}@postgres:5432/taskflow
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your_jwt_secret_key_change_this_in_production}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_HOST_PORT:-42002}:80"
    volumes:
      - ./web-client:/usr/share/nginx/html:ro
      - ./web-client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
